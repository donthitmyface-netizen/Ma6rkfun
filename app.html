<style>

button,input,select{font-family:inherit;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.float{animation:floatY 2.5s ease-in-out infinite}
.fade{animation:fadeIn .3s ease}

/* Header */
#header{background:linear-gradient(135deg,var(--header1),var(--header2));padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 3px 12px rgba(0,0,0,.2);}
#header .title{flex:1}
#header .title h1{font-size:18px;font-weight:900;color:#fff;letter-spacing:.5px}
#header .title p{font-size:9px;color:rgba(255,255,255,.75);letter-spacing:1.5px;margin-top:2px}
.theme-btns{display:flex;gap:5px}
.theme-btn{width:28px;height:28px;border-radius:8px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.theme-btn.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.4)}
#draw-info{text-align:right;flex-shrink:0}
#draw-info .draw{font-size:11px;color:#fff;font-weight:800}
#draw-info .date{font-size:9px;color:rgba(255,255,255,.75)}

/* Lucky bar */
#lucky-bar{background:rgba(233,30,99,.08);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:8px;}
#lucky-bar span{font-size:10px;color:var(--accent);font-weight:700;white-space:nowrap}
#lucky-track{flex:1;height:5px;background:var(--track);border-radius:3px;overflow:hidden}
#lucky-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}
#lucky-pct{font-size:10px;font-weight:800;color:var(--accent);white-space:nowrap}
#lucky-msg{font-size:9px;color:var(--sub);white-space:nowrap}

/* Tabs */
#tabs{display:flex;overflow-x:auto;background:var(--tab);border-bottom:2px solid var(--border);position:sticky;top:64px;z-index:199;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 10px;border:none;background:none;border-bottom:3px solid transparent;color:var(--sub);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn.active{border-bottom-color:var(--accent);color:var(--accent)}

/* Content */
#content{padding:12px 12px 60px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px var(--shadow)}
.card.accent-top{border-top:4px solid var(--accent)}
.row-item{background:var(--row);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px}

/* Balls */
.ball{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;user-select:none;transition:all .15s}
.ball-r{background:#ffcdd2;border:2px solid #e53935;color:#e53935}
.ball-b{background:#bbdefb;border:2px solid #1e88e5;color:#1e88e5}
.ball-g{background:#c8e6c9;border:2px solid #43a047;color:#43a047}
.ball-o{background:#ffe0b2;border:2px solid #fb8c00;color:#fb8c00}
.ball-p{background:#e1bee7;border:2px solid #8e24aa;color:#8e24aa}
.ball-r.extra{background:#e53935;color:#fff;border-color:#e53935}
.ball-b.extra{background:#1e88e5;color:#fff;border-color:#1e88e5}
.ball-g.extra{background:#43a047;color:#fff;border-color:#43a047}
.ball-o.extra{background:#fb8c00;color:#fff;border-color:#fb8c00}
.ball-p.extra{background:#8e24aa;color:#fff;border-color:#8e24aa}

/* Buttons */
.btn{padding:11px 16px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.15);border:1.5px solid transparent;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-full{width:100%}
.btn-ghost{background:var(--card);color:var(--text);border-color:var(--iborder)}
.btn-success{background:#2e7d32;color:#fff}
.btn-danger{background:#c62828;color:#fff}
.btn-gold{background:#f57f17;color:#fff}
.btn-purple{background:#6a1b9a;color:#fff}
.btn-fun{background:linear-gradient(135deg,var(--accent),#ff8a65);color:#fff}
.btn:disabled{background:var(--row);color:var(--dim);border-color:var(--track);box-shadow:none;cursor:default}

/* Pills */
.pill{padding:7px 14px;border-radius:20px;border:1.5px solid var(--iborder);background:var(--card);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.15)}

/* Input */
input[type=text],input[type=date],input[type=password]{width:100%;padding:11px 13px;background:var(--input);border:1.5px solid var(--iborder);border-radius:10px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px}

/* Bar */
.bar-track{flex:1;height:6px;background:var(--track);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}

/* Grid 49 */
.grid49{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.grid49 button{aspect-ratio:1;border-radius:50%;font-weight:800;font-size:11px;cursor:pointer;border:2px solid var(--iborder);background:var(--input);transition:all .1s;padding:0}

/* Toast */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);border-radius:12px;padding:10px 20px;font-size:13px;color:#fff;z-index:9999;max-width:92vw;text-align:center;line-height:1.5;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3);font-weight:600;display:none}
#toast.ok{background:#2e7d32}
#toast.err{background:#c62828}

/* Confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9990;overflow:hidden;display:none}

.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:360px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.3)}

#fab{position:fixed;bottom:22px;right:16px;width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,#e91e63,#ff6090);font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(233,30,99,.4);z-index:100;color:#fff}

body.dark{

body.dark .ball-g{background:#083008;color:#ddd}
body.dark .ball-o{background:#5a2000;color:#ddd}
body.dark .ball-p{background:#200030;color:#ddd}

/* Pastel theme */
body.pastel{
  --bg:#f0f7ff;--card:#fff;--border:#d0e8ff;--text:#1a2a4a;--sub:#6080a0;

/* Workshop tabs */
.w-tabs{display:flex;background:var(--track);border-radius:12px;padding:4px;margin-bottom:14px}
.w-tab{flex:1;padding:9px 4px;border:none;border-radius:9px;background:none;color:var(--sub);font-weight:800;font-size:12px;cursor:pointer;transition:all .2s}
.w-tab.active{background:var(--card);color:var(--accent);box-shadow:0 2px 8px var(--shadow)}

/* Method cards */
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.method-card{padding:10px 12px;border-radius:12px;border:2px solid var(--iborder);background:var(--input);cursor:pointer;text-align:left;transition:all .15s}
.method-card.active{box-shadow:0 2px 8px rgba(0,0,0,.2)}

.method-card .mc-label{font-size:11px;font-weight:800}
.method-card .mc-desc{font-size:9px;color:var(--dim)}

/* Source tag */
.src-tag{display:inline-block;font-size:9px;background:rgba(233,30,99,.13);color:var(--accent);border-radius:20px;padding:2px 7px;margin-right:4px;margin-bottom:2px;font-weight:700}

/* Heatmap */
.heat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.heat-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid transparent;transition:all .3s}
.heat-cell .hn{font-size:11px;font-weight:900}
.heat-cell .hc{font-size:8px}

/* Countdown */
#countdown{font-variant-numeric:tabular-nums;font-size:26px;font-weight:900;color:var(--accent);letter-spacing:2px}

/* Steps */
.step-label{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:4px;letter-spacing:1px}

/* Result display */
.result-card{background:linear-gradient(135deg,var(--card),var(--accent-bg));border:1px solid var(--border);border-top:4px solid var(--accent);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 16px var(--shadow)}
.balls-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}

/* MBTI grid */
.mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.mbti-btn{padding:7px 3px;border-radius:10px;border:2px solid var(--iborder);background:var(--input);cursor:pointer;transition:all .15s}
.mbti-btn.active{border-color:var(--accent);background:var(--accent-bg)}
.mbti-btn .mb-name{font-size:10px;font-weight:800;color:var(--text)}
.mbti-btn.active .mb-name{color:var(--accent)}
.mbti-btn .mb-desc{font-size:8px;color:var(--sub);margin-top:1px}

/* Sub-tabs (predict) */
.sub-tabs{display:flex;margin-bottom:14px;background:var(--track);border-radius:12px;padding:4px}
.sub-tab{flex:1;padding:10px 0;border:none;border-radius:9px;background:none;color:var(--sub);font-weight:800;font-size:13px;cursor:pointer;transition:all .2s}
.sub-tab.active{background:var(--card);box-shadow:0 2px 8px var(--shadow)}

.post-card{background:var(--row);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.post-card:hover{border-color:var(--accent)}

.sbar-track{height:5px;background:var(--track);border-radius:3px;overflow:hidden}

function ball(n, sz=40, extra=false, dim=false, ring=false, ringColor=''){

const PHI=1.6180339887,FIBS=[1,2,3,5,8,13,21,34];
function hotScores(){const f={};for(let i=1;i<=49;i++)f[i]=0;hist.slice(0,12).forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f))||1;const s={};for(let n=1;n<=49;n++)s[n]=f[n]/mf;return s;}
function coldScores(){const hs=hotScores();const s={};for(let n=1;n<=49;n++)s[n]=1-hs[n];return s;}
function goldenScores(){const gp=[49/PHI,49/PHI**2,49*(1-1/PHI),49/PHI**3,49*(2-PHI),49*(PHI-1),30,19];const f={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f));const s={};for(let n=1;n<=49;n++){const d=Math.min(...gp.map(p=>Math.abs(n-p)));s[n]=Math.max(0,1-d/10)*.6+(f[n]/mf)*.4;}return s;}
function fibScores(){const f={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f));const s={};for(let n=1;n<=49;n++){const fd=Math.min(...FIBS.map(x=>Math.abs(n-x)));const pd=Math.min(...FIBS.map(x=>Math.abs(n-x*PHI)));s[n]=(FIBS.includes(n)?1:Math.max(0,1-fd/8))*.35+Math.max(0,1-pd/5)*.25+(f[n]/mf)*.4;}return s;}
function gapScores(){const f={},ls={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra},i)=>[...numbers,extra].forEach(n=>{f[n]++;if(ls[n]===undefined)ls[n]=i;}));const td=hist.length;const s={};for(let n=1;n<=49;n++){const ap=f[n]>0?td/f[n]:td;s[n]=Math.min((ls[n]!==undefined?ls[n]:td)/ap/3,1);}return s;}
function runMath(){
  const golden=goldenScores(),fib=fibScores(),gap=gapScores(),hot=hotScores(),cold=coldScores();
  const parity={},sum={},tail={};
  const p={odd:0,even:0};hist.forEach(({numbers})=>numbers.forEach(n=>n%2===0?p.even++:p.odd++));
  const r=p.odd/(p.odd+p.even);
  const sm=hist.map(({numbers})=>numbers.reduce((a,b)=>a+b,0));
  const apn=sm.reduce((a,b)=>a+b,0)/sm.length/6;
  const tf={};for(let t=0;t<=9;t++)tf[t]=0;
  hist.slice(0,10).forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>tf[n%10]++));
  const mt=Math.max(...Object.values(tf));
  for(let n=1;n<=49;n++){parity[n]=n%2?1-r:r;sum[n]=Math.max(0,1-Math.abs(n-apn)/25);tail[n]=1-tf[n%10]/(mt+1);}
  const W={golden:.20,fib:.15,gap:.25,parity:.15,sum:.15,tail:.10};
  const fs={};
  for(let n=1;n<=49;n++)fs[n]=(golden[n]||0)*W.golden+(fib[n]||0)*W.fib+(gap[n]||0)*W.gap+(parity[n]||0)*W.parity+(sum[n]||0)*W.sum+(tail[n]||0)*W.tail;
  return Object.entries(fs).sort((a,b)=>b[1]-a[1]).map(([n,score])=>({n:+n,score,golden:golden[n],fib:fib[n],gap:gap[n],parity:parity[n],sum:sum[n],tail:tail[n]}));
}

function parseHK(text){
  var rows=[];
  try{
    // Strip all HTML tags to get plain text
    var plain=text.replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
                  .replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
                  .replace(/<[^>]+>/g,' ')
                  .replace(/&nbsp;/g,' ')
                  .replace(/&amp;/g,'&')
                  .replace(/\s+/g,' ');
    
    // Find all draw numbers like 26/021
    var drawRe=/\b(\d{2}\/\d{3})\b/g;
    var m, draws=[];
    while((m=drawRe.exec(plain))!==null) draws.push({draw:m[1],pos:m.index});
    
    // Remove duplicate draws (keep first occurrence)
    var seen={}, uniqueDraws=[];
    for(var i=0;i<draws.length;i++){
      if(!seen[draws[i].draw]){seen[draws[i].draw]=true;uniqueDraws.push(draws[i]);}
    }
    
    var MONTHS={january:'01',february:'02',march:'03',april:'04',may:'05',june:'06',july:'07',august:'08',september:'09',october:'10',november:'11',december:'12'};
    
    for(var i=0;i<uniqueDraws.length&&rows.length<30;i++){
      var pos=uniqueDraws[i].pos;
      var chunk=plain.slice(pos,pos+400);
      
      // Find date: "24 February 2026" or "2026-02-24"
      var date='';
      var dm=chunk.match(/(\d{1,2})\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+(\d{4})/i);
      if(dm){
        date=dm[3]+'-'+MONTHS[dm[2].toLowerCase()]+'-'+dm[1].padStart(2,'0');
      } else {
        var dm2=chunk.match(/(\d{4})-(\d{2})-(\d{2})/);
        if(dm2) date=dm2[1]+'-'+dm2[2]+'-'+dm2[3];
      }
      if(!date) continue;
      
      // Find 7 numbers 1-49, skip year numbers like 2026
      var numRe=/\b([1-9]|[1-4][0-9])\b/g;
      numRe.lastIndex=0;
      var nums=[], seenN={}, nm;
      while((nm=numRe.exec(chunk))!==null){
        var n=parseInt(nm[1]);
        if(n>=1&&n<=49&&!seenN[n]){seenN[n]=true;nums.push(n);}
        if(nums.length>=7) break;
      }
      
      if(nums.length>=7){
        rows.push({
          draw:uniqueDraws[i].draw,
          date:date,
          numbers:nums.slice(0,6).sort(function(a,b){return a-b;}),
          extra:nums[6]
        });
      }
    }
  }catch(e){}
  return rows;
}

async function doWorkshopAI(){
  var prov=localStorage.getItem('ms_ai_provider')||'anthropic';
  var key=localStorage.getItem('ms_key_'+prov)||localStorage.getItem('ms_key')||'';
  if(!key){showToast('請先在⚙️設定 '+prov+' API Key','err');return;}
  wAiLoading=true;render();
  var recent=hist.slice(0,10).map(function(h){return h.draw+': '+h.numbers.join(',')+'  特'+h.extra;}).join('\n');
  var prompt='你是六合彩分析師。近10期開獎:\n'+recent+'\n\n請推薦6個正碼(1-49)和1個特別號，用JSON格式回覆，只返回JSON不要其他文字：{"numbers":[n1,n2,n3,n4,n5,n6],"extra":n7,"reason":"分析理由50字內"}';
  try{
    var result=null;
    if(prov==='anthropic'){
      var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,messages:[{role:'user',content:prompt}]})});
      var d=await r.json();
      result=d.content&&d.content[0]?d.content[0].text:'';
    } else if(prov==='deepseek'){
      var r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'deepseek-chat',max_tokens:300,messages:[{role:'user',content:prompt}]})});
      var d=await r.json();
      result=d.choices&&d.choices[0]?d.choices[0].message.content:'';
    } else if(prov==='grok'){
      var r=await fetch('https://api.x.ai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'grok-3-mini',max_tokens:300,messages:[{role:'user',content:prompt}]})});
      var d=await r.json();
      result=d.choices&&d.choices[0]?d.choices[0].message.content:'';
    }
    if(!result) throw new Error('無回應');
    var clean=result.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(clean);
    var nums=parsed.numbers.filter(function(n){return n>=1&&n<=49;}).slice(0,6);
    var extra=parsed.extra;
    if(nums.length===6&&extra>=1&&extra<=49){
      wResult={nums:nums.sort(function(a,b){return a-b;}),extra:extra,aiReason:parsed.reason||'',isAI:true,details:[]};
      showConfetti();showToast('🤖 AI推薦出爐！','ok');
    } else throw new Error('號碼格式錯誤');
  }catch(e){showToast('❌ AI失敗: '+e.message,'err');}
  wAiLoading=false;render();
}

function togglePick(n){if(picked.includes(n))picked=picked.filter(function(x){return x!==n;});else if(picked.length<6)picked.push(n);checkResult=null;render();}
function doCheck(){
  var l=hist[0];if(picked.length<6){showToast('請先選擇 6 個號碼','err');return;}
  var matched=picked.filter(function(n){return l.numbers.includes(n);}),xHit=picked.includes(l.extra);
  var prize='😢 未中獎',win=false;
  if(matched.length===6){prize='🏆 一獎！恭喜發財！';win=true;}
  else if(matched.length===5&&xHit){prize='🥈 二獎！好勁！';win=true;}
  else if(matched.length===5){prize='🥉 三獎！';win=true;}
  else if(matched.length===4&&xHit){prize='🎖 四獎！';win=true;}
  else if(matched.length===4){prize='🏅 五獎！';win=true;}
  else if(matched.length===3&&xHit){prize='🎗 六獎！';win=true;}
  else if(matched.length===3){prize='🎗 七獎！';win=true;}
  checkResult={prize:prize,matched:matched,xHit:xHit,win:win};
  if(win)showConfetti();render();
}

function doMath(){
  mLoading=true;mResult=null;render();
  setTimeout(function(){
    try{
      var ranked=runMath();
      var sortMap={golden:function(a,b){return b.golden-a.golden;},fib:function(a,b){return b.fib-a.fib;},gap:function(a,b){return b.gap-a.gap;},parity:function(a,b){return b.parity-a.parity;},sumzone:function(a,b){return b.sum-a.sum;},tail:function(a,b){return b.tail-a.tail;}};
      var mr=sortMap[mMethod]?ranked.slice().sort(sortMap[mMethod]):ranked;
      var top=mr.slice(0,6).map(function(x){return x.n;}).sort(function(a,b){return a-b;});
      var extra=ranked.slice().sort(function(a,b){return b.gap-a.gap;}).find(function(x){return !top.includes(x.n);}).n;
      mResult={numbers:top,extra:extra,top15:mr.slice(0,15)};
    }catch(e){mResult={error:true};}
    mLoading=false;render();
  },80);
}

async function doAI(){
  var apiKey=localStorage.getItem('ms_key')||'';
  if(!apiKey){showToast('⚙️ 請先設定 API Key','err');return;}
  pLoading=true;aiResult=null;render();
  var ranked=runMath();
  var mathTop=ranked.slice(0,10).map(function(r){return r.n+'('+Math.round(r.score*100)+')';}).join(',');
  var recent=hist.slice(0,5).map(function(h){return h.draw+':'+h.numbers.join(',')+'+特'+h.extra;}).join('|');
  var dc=pCount-sureCt,sp,um;
  if(betMode==='bravery'){sp='六合彩分析師。只回JSON：{"sure":['+sureCt+'個膽碼],"drag":['+dc+'個拖碼],"extra":特別號,"analysis":"繁體60字"}';um='近期:'+recent+'\nTop10:'+mathTop+'\n膽'+sureCt+'拖'+dc;}
  else{sp='六合彩分析師。只回JSON：{"numbers":['+pCount+'個1-49不重複],"extra":特別號,"analysis":"繁體60字"}';um='近期:'+recent+'\nTop10:'+mathTop+'\n建議'+pCount+'個';}
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,system:sp,messages:[{role:'user',content:um}]})});
    var d=await res.json();
    if(d.error) throw new Error(d.error.message);
    var r=JSON.parse((d.content&&d.content[0]&&d.content[0].text||'').replace(/```json|```/g,'').trim());
    if(betMode==='bravery'){if(r.sure&&r.sure.length===sureCt&&r.drag) aiResult=Object.assign({type:'bravery'},r);else throw 0;}
    else{if(r.numbers&&r.numbers.length===pCount) aiResult=Object.assign({type:'standard'},r);else throw 0;}
  }catch(e){aiResult={error:true};}
  pLoading=false;render();
}

    out+='<div style="font-size:13px;line-height:1.9;background:var(--row);border-radius:10px;padding:14px">'+selPost.content.replace(/\n/g,'<br/>')+'</div></div>';
    
  // 廣告位
  out+='<div class="ad-slot" style="margin:10px 0;min-height:60px;background:var(--row);border:1px dashed var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center">';
  out+='<span style="font-size:10px;color:var(--dim)">廣告位</span>';
  out+='</div>';
  return out;
  }
  out+='<div style="font-size:12px;color:var(--sub);font-weight:700;margin-bottom:8px">📌 置頂公告</div>';
  for(var i=0;i<POSTS.length;i++){
    var p=POSTS[i];
    if(!p.pin) continue;
    out+='<div class="post-card pinned" onclick="selPost=POSTS['+i+'];render()">';
    out+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">'+p.emoji+'</span>';
    out+='<div style="flex:1"><div class="post-title">'+p.title+'</div><div class="post-meta">管理員 · '+p.date+(p.likes>0?' · ❤️'+p.likes:'')+'</div></div></div>';
    out+='<div class="post-preview">'+p.content.slice(0,70)+'...</div></div>';
  }
  out+='<div style="font-size:12px;color:var(--sub);font-weight:700;margin:14px 0 8px">💬 管理員討論</div>';
  for(var i=0;i<POSTS.length;i++){
    var p=POSTS[i];
    if(p.pin) continue;
    out+='<div class="post-card" onclick="selPost=POSTS['+i+'];render()">';
    out+='<div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">'+p.emoji+'</span>';
    out+='<div style="flex:1"><div class="post-title">'+p.title+'</div><div class="post-meta">管理員 · '+p.date+' · ❤️'+p.likes+'</div></div></div>';
    out+='<div class="post-preview">'+p.content.slice(0,80)+'...</div></div>';
  }
  out+='<div class="card" style="margin-top:4px"><div style="font-size:13px;font-weight:700;margin-bottom:4px">💬 加入討論</div>';
  out+='<div style="font-size:11px;color:var(--sub);margin-bottom:12px;line-height:1.7">點任何帖子可查看全文，或在下方直接留言！</div>';
  out+='<div id="disqus_thread" style="min-height:200px"></div></div>';
  return out;
}
function initDisqus(){
  try{
    if(disqusLoaded){if(window.DISQUS)window.DISQUS.reset({reload:true,config:function(){this.page.url=window.location.href;this.page.identifier='liuhechuzhong-discuss';}});return;}
    disqusLoaded=true;
    window.disqus_config=function(){this.page.url=window.location.href;this.page.identifier='liuhechuzhong-discuss';};
    var s=document.createElement('script');s.src='https://'+DISQUS_SHORTNAME+'.disqus.com/embed.js';s.async=true;
    s.onerror=function(){var el=document.getElementById('disqus_thread');if(el)el.innerHTML='<div style="padding:14px;color:var(--sub);font-size:12px;text-align:center">💬 留言功能載入中，請稍後重試</div>';};
    document.head.appendChild(s);
  }catch(e){}
}
// ── Init ──
window.onerror = function(msg, src, line, col, err) {
  const c = document.getElementById('content');
  if(c) c.innerHTML = '<div style="padding:20px;background:#ffebee;border-radius:12px;color:#c62828;font-size:12px;line-height:2">' +
    '<strong>JS Error:</strong><br/>' + msg + '<br/>Line: ' + line + '<br/>' + (err?err.stack:'') + '</div>';
  return false;
};
try {

render();

}

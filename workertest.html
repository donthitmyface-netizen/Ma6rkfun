<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Worker Test</title>
<style>body{font-family:monospace;padding:16px;background:#fff5f8}button{padding:12px 20px;background:#e91e63;color:#fff;border:none;border-radius:10px;font-size:16px;cursor:pointer;display:block;width:100%;margin-bottom:12px}#log{background:#f8f8f8;border:1px solid #ddd;border-radius:8px;padding:12px;font-size:12px;line-height:2;white-space:pre-wrap;min-height:100px}</style>
</head>
<body>
<h2>🔧 Worker 診斷</h2>
<button onclick="testXHR()">Test XHR</button>
<button onclick="testFetch()">Test Fetch</button>
<button onclick="testCORS()">Test CORS Headers</button>
<div id="log">等待測試...</div>
<script>
var WORKER='https://ma6rkfun.donthitmyface.workers.dev';
var log=document.getElementById('log');
function add(msg){log.textContent+='\n'+msg;}

function testXHR(){
  log.textContent='XHR 測試開始...';
  var start=Date.now();
  var xhr=new XMLHttpRequest();
  xhr.timeout=10000;
  xhr.onload=function(){add('✅ 狀態: '+xhr.status);add('⏱ 時間: '+(Date.now()-start)+'ms');add('📦 大小: '+xhr.responseText.length+' bytes');add('首100字: '+xhr.responseText.slice(0,100));};
  xhr.onerror=function(){add('❌ XHR onerror 觸發');};
  xhr.ontimeout=function(){add('❌ XHR 超時 (10s)');};
  xhr.onabort=function(){add('❌ XHR 被中止');};
  xhr.open('GET',WORKER,true);
  xhr.send();
}

function testFetch(){
  log.textContent='Fetch 測試開始...';
  var start=Date.now();
  fetch(WORKER)
    .then(function(r){add('✅ 狀態: '+r.status);add('⏱ 時間: '+(Date.now()-start)+'ms');return r.text();})
    .then(function(t){add('📦 大小: '+t.length+' bytes');add('首100字: '+t.slice(0,100));})
    .catch(function(e){add('❌ Fetch 錯誤: '+e.message);});
}

function testCORS(){
  log.textContent='CORS 測試開始...';
  fetch(WORKER,{method:'OPTIONS'})
    .then(function(r){
      add('狀態: '+r.status);
      add('Access-Control-Allow-Origin: '+r.headers.get('access-control-allow-origin'));
      add('Content-Type: '+r.headers.get('content-type'));
    })
    .catch(function(e){add('❌ '+e.message);});
}
</script>
</body></html>

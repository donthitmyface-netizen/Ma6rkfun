<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>六合常中 🎱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff5f8;--card:#fff;--border:#ffd6e7;--text:#3d1a2e;--sub:#a0688a;
  --dim:#c4a0b4;--accent:#e91e63;--accent-bg:#fce4ec;--track:#fce4ec;
  --row:#fff5f8;--input:#fff8fb;--iborder:#f8bbd0;--shadow:rgba(233,30,99,.1);
  --tab:#fff;--header1:#e91e63;--header2:#ff6090;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans HK",sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:0;height:0;}
button,input,select{font-family:inherit;}

/* Animations */
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes confetti{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.float{animation:floatY 2.5s ease-in-out infinite}
.fade{animation:fadeIn .3s ease}

/* Header */
#header{background:linear-gradient(135deg,var(--header1),var(--header2));padding:12px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 3px 12px rgba(0,0,0,.2);}
#header .title{flex:1}
#header .title h1{font-size:18px;font-weight:900;color:#fff;letter-spacing:.5px}
#header .title p{font-size:9px;color:rgba(255,255,255,.75);letter-spacing:1.5px;margin-top:2px}
.theme-btns{display:flex;gap:5px}
.theme-btn{width:28px;height:28px;border-radius:8px;border:2px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.theme-btn.active{border-color:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.4)}
#draw-info{text-align:right;flex-shrink:0}
#draw-info .draw{font-size:11px;color:#fff;font-weight:800}
#draw-info .date{font-size:9px;color:rgba(255,255,255,.75)}

/* Lucky bar */
#lucky-bar{background:rgba(233,30,99,.08);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:8px;}
#lucky-bar span{font-size:10px;color:var(--accent);font-weight:700;white-space:nowrap}
#lucky-track{flex:1;height:5px;background:var(--track);border-radius:3px;overflow:hidden}
#lucky-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}
#lucky-pct{font-size:10px;font-weight:800;color:var(--accent);white-space:nowrap}
#lucky-msg{font-size:9px;color:var(--sub);white-space:nowrap}

/* Tabs */
#tabs{display:flex;overflow-x:auto;background:var(--tab);border-bottom:2px solid var(--border);position:sticky;top:64px;z-index:199;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 10px;border:none;background:none;border-bottom:3px solid transparent;color:var(--sub);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:color .15s}
.tab-btn.active{border-bottom-color:var(--accent);color:var(--accent)}

/* Content */
#content{padding:12px 12px 60px}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px var(--shadow)}
.card.accent-top{border-top:4px solid var(--accent)}
.row-item{background:var(--row);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px}

/* Balls */
.ball{border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;user-select:none;transition:all .15s}
.ball-r{background:#ffcdd2;border:2px solid #e53935;color:#e53935}
.ball-b{background:#bbdefb;border:2px solid #1e88e5;color:#1e88e5}
.ball-g{background:#c8e6c9;border:2px solid #43a047;color:#43a047}
.ball-o{background:#ffe0b2;border:2px solid #fb8c00;color:#fb8c00}
.ball-p{background:#e1bee7;border:2px solid #8e24aa;color:#8e24aa}
.ball-r.extra{background:#e53935;color:#fff;border-color:#e53935}
.ball-b.extra{background:#1e88e5;color:#fff;border-color:#1e88e5}
.ball-g.extra{background:#43a047;color:#fff;border-color:#43a047}
.ball-o.extra{background:#fb8c00;color:#fff;border-color:#fb8c00}
.ball-p.extra{background:#8e24aa;color:#fff;border-color:#8e24aa}

/* Buttons */
.btn{padding:11px 16px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,.15);border:1.5px solid transparent;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-full{width:100%}
.btn-ghost{background:var(--card);color:var(--text);border-color:var(--iborder)}
.btn-success{background:#2e7d32;color:#fff}
.btn-danger{background:#c62828;color:#fff}
.btn-gold{background:#f57f17;color:#fff}
.btn-purple{background:#6a1b9a;color:#fff}
.btn-fun{background:linear-gradient(135deg,var(--accent),#ff8a65);color:#fff}
.btn:disabled{background:var(--row);color:var(--dim);border-color:var(--track);box-shadow:none;cursor:default}

/* Pills */
.pill{padding:7px 14px;border-radius:20px;border:1.5px solid var(--iborder);background:var(--card);color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.15)}

/* Input */
input[type=text],input[type=date],input[type=password]{width:100%;padding:11px 13px;background:var(--input);border:1.5px solid var(--iborder);border-radius:10px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px}

/* Bar */
.bar-track{flex:1;height:6px;background:var(--track);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}

/* Grid 49 */
.grid49{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.grid49 button{aspect-ratio:1;border-radius:50%;font-weight:800;font-size:11px;cursor:pointer;border:2px solid var(--iborder);background:var(--input);transition:all .1s;padding:0}

/* Toast */
#toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);border-radius:12px;padding:10px 20px;font-size:13px;color:#fff;z-index:9999;max-width:92vw;text-align:center;line-height:1.5;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.3);font-weight:600;display:none}
#toast.ok{background:#2e7d32}
#toast.err{background:#c62828}

/* Confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9990;overflow:hidden;display:none}

/* Settings */
#settings-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:none;align-items:center;justify-content:center;padding:20px}
#settings-modal.open{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:24px;max-width:360px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.3)}

/* FAB */
#fab{position:fixed;bottom:22px;right:16px;width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,#e91e63,#ff6090);font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(233,30,99,.4);z-index:100;color:#fff}

/* Dark theme */
body.dark{
  --bg:#121212;--card:#1e1e1e;--border:#333;--text:#f0f0f0;--sub:#aaa;
  --dim:#555;--accent:#ff69b4;--accent-bg:#2a0f1f;--track:#333;
  --row:#252525;--input:#2a2a2a;--iborder:#444;--shadow:rgba(0,0,0,.5);
  --tab:#1e1e1e;--header1:#1a0a12;--header2:#2d0a1f;
}
body.dark .ball-r{background:#5a0000;color:#ddd}
body.dark .ball-b{background:#082040;color:#ddd}
body.dark .ball-g{background:#083008;color:#ddd}
body.dark .ball-o{background:#5a2000;color:#ddd}
body.dark .ball-p{background:#200030;color:#ddd}

/* Pastel theme */
body.pastel{
  --bg:#f0f7ff;--card:#fff;--border:#d0e8ff;--text:#1a2a4a;--sub:#6080a0;
  --dim:#a0c0e0;--accent:#5b8dee;--accent-bg:#e8f0ff;--track:#ddeeff;
  --row:#f5f9ff;--input:#f8fbff;--iborder:#c0d8ff;--shadow:rgba(91,141,238,.1);
  --tab:#fff;--header1:#5b8dee;--header2:#a855f7;
}

/* Workshop tabs */
.w-tabs{display:flex;background:var(--track);border-radius:12px;padding:4px;margin-bottom:14px}
.w-tab{flex:1;padding:9px 4px;border:none;border-radius:9px;background:none;color:var(--sub);font-weight:800;font-size:12px;cursor:pointer;transition:all .2s}
.w-tab.active{background:var(--card);color:var(--accent);box-shadow:0 2px 8px var(--shadow)}

/* Method cards */
.method-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.method-card{padding:10px 12px;border-radius:12px;border:2px solid var(--iborder);background:var(--input);cursor:pointer;text-align:left;transition:all .15s}
.method-card.active{box-shadow:0 2px 8px rgba(0,0,0,.2)}
.method-card .mc-icon{font-size:16px;margin-bottom:3px}
.method-card .mc-label{font-size:11px;font-weight:800}
.method-card .mc-desc{font-size:9px;color:var(--dim)}

/* Source tag */
.src-tag{display:inline-block;font-size:9px;background:rgba(233,30,99,.13);color:var(--accent);border-radius:20px;padding:2px 7px;margin-right:4px;margin-bottom:2px;font-weight:700}

/* Heatmap */
.heat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.heat-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid transparent;transition:all .3s}
.heat-cell .hn{font-size:11px;font-weight:900}
.heat-cell .hc{font-size:8px}

/* Countdown */
#countdown{font-variant-numeric:tabular-nums;font-size:26px;font-weight:900;color:var(--accent);letter-spacing:2px}

/* Steps */
.step-label{font-size:12px;font-weight:800;color:var(--sub);margin-bottom:4px;letter-spacing:1px}

/* Result display */
.result-card{background:linear-gradient(135deg,var(--card),var(--accent-bg));border:1px solid var(--border);border-top:4px solid var(--accent);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 16px var(--shadow)}
.balls-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center}

/* MBTI grid */
.mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.mbti-btn{padding:7px 3px;border-radius:10px;border:2px solid var(--iborder);background:var(--input);cursor:pointer;transition:all .15s}
.mbti-btn.active{border-color:var(--accent);background:var(--accent-bg)}
.mbti-btn .mb-name{font-size:10px;font-weight:800;color:var(--text)}
.mbti-btn.active .mb-name{color:var(--accent)}
.mbti-btn .mb-desc{font-size:8px;color:var(--sub);margin-top:1px}

/* Sub-tabs (predict) */
.sub-tabs{display:flex;margin-bottom:14px;background:var(--track);border-radius:12px;padding:4px}
.sub-tab{flex:1;padding:10px 0;border:none;border-radius:9px;background:none;color:var(--sub);font-weight:800;font-size:13px;cursor:pointer;transition:all .2s}
.sub-tab.active{background:var(--card);box-shadow:0 2px 8px var(--shadow)}

/* Discussion */
.post-card{background:var(--row);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.post-card:hover{border-color:var(--accent)}
.post-card.pinned{background:linear-gradient(135deg,var(--card),var(--accent-bg));border:1.5px solid rgba(233,30,99,.2)}
.post-title{font-size:13px;font-weight:800;color:var(--text);margin-bottom:4px}
.post-meta{font-size:9px;color:var(--sub)}
.post-preview{font-size:11px;color:var(--sub);line-height:1.6;margin-top:8px}

/* Chip row */
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}

/* Inline stat bar */
.sbar{margin-bottom:5px}
.sbar-header{display:flex;justify-content:space-between;font-size:9px;color:var(--sub);margin-bottom:2px}
.sbar-track{height:5px;background:var(--track);border-radius:3px;overflow:hidden}
.sbar-fill{height:100%;border-radius:3px;transition:width .5s}

</style>
</head>

const ZC = {r:'#e53935',b:'#1e88e5',g:'#43a047',o:'#fb8c00',p:'#8e24aa'};
const ZCL = {r:'#ffcdd2',b:'#bbdefb',g:'#c8e6c9',o:'#ffe0b2',p:'#e1bee7'};
const ZCD = {r:'#5a0000',b:'#082040',g:'#083008',o:'#5a2000',p:'#200030'};
function gz(n){return n<=10?'r':n<=20?'b':n<=30?'g':n<=40?'o':'p';}

function ball(n, sz=40, extra=false, dim=false, ring=false, ringColor=''){
  const c=gz(n), col=ZC[c];
  const rc = ringColor||col;
  const isDark = document.body.classList.contains('dark');
  const bg = extra ? col : (isDark ? ZCD[c] : ZCL[c]);
  const textCol = extra ? '#fff' : (isDark ? '#ddd' : col);
  const border = ring ? `3px solid ${rc}` : `2px solid ${col}`;
  const fs = Math.round(sz*0.37);
  const opacity = dim ? 0.35 : 1;
  const shadow = ring ? `0 0 0 2px ${rc},0 3px 10px rgba(0,0,0,.2)` : extra ? '0 3px 10px rgba(0,0,0,.3)' : '0 2px 6px rgba(0,0,0,.12)';
  return `<div style="width:${sz}px;height:${sz}px;border-radius:50%;flex-shrink:0;background:${bg};border:${border};display:inline-flex;align-items:center;justify-content:center;color:${textCol};font-weight:900;font-size:${fs}px;box-shadow:${shadow};opacity:${opacity};user-select:none">${n}</div>`;
}

function ballsRow(numbers, extra, sz=40){
  return numbers.map(n=>ball(n,sz)).join('') + `<span style="color:var(--dim);font-size:${sz*0.5}px;margin:0 4px;font-weight:300">+</span>` + ball(extra,sz,true);
}

function fmtPrize(n){if(n>=1e8)return`$${(n/1e8).toFixed(1)}億`;if(n>=1e7)return`$${(n/1e7).toFixed(0)}千萬`;if(n>=1e6)return`$${(n/1e6).toFixed(0)}百萬`;return`$${n.toLocaleString()}`;}

function calcStats(){
  const freq={},last={};
  for(let i=1;i<=49;i++)freq[i]=0;
  hist.forEach(({numbers,extra},idx)=>[...numbers,extra].forEach(n=>{freq[n]++;if(last[n]===undefined)last[n]=idx;}));
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  return {freq,last,sorted,mxF:+sorted[0][1]};
}

function calcNextDraw(){
  const l=hist[0],[yr,num]=l.draw.split('/');
  const dn=`${yr}/${String(parseInt(num)+1).padStart(3,'0')}`;
  const dd=[2,4,6];let d=new Date(`${l.date}T21:30:00+08:00`);
  d.setDate(d.getDate()+1);
  while(!dd.includes(d.getDay()))d.setDate(d.getDate()+1);
  return{drawNum:dn,date:d.toISOString().slice(0,10)};
}

function getCountdown(){
  const nd=calcNextDraw();
  const diff=new Date(`${nd.date}T21:30:00+08:00`)-new Date();
  if(diff<=0)return null;
  return{days:Math.floor(diff/86400000),hours:Math.floor(diff%86400000/3600000),mins:Math.floor(diff%3600000/60000),secs:Math.floor(diff%60000/1000),diff};
}

// ── Math engines ──
const PHI=1.6180339887,FIBS=[1,2,3,5,8,13,21,34];
function hotScores(){const f={};for(let i=1;i<=49;i++)f[i]=0;hist.slice(0,12).forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f))||1;const s={};for(let n=1;n<=49;n++)s[n]=f[n]/mf;return s;}
function coldScores(){const hs=hotScores();const s={};for(let n=1;n<=49;n++)s[n]=1-hs[n];return s;}
function goldenScores(){const gp=[49/PHI,49/PHI**2,49*(1-1/PHI),49/PHI**3,49*(2-PHI),49*(PHI-1),30,19];const f={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f));const s={};for(let n=1;n<=49;n++){const d=Math.min(...gp.map(p=>Math.abs(n-p)));s[n]=Math.max(0,1-d/10)*.6+(f[n]/mf)*.4;}return s;}
function fibScores(){const f={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f));const s={};for(let n=1;n<=49;n++){const fd=Math.min(...FIBS.map(x=>Math.abs(n-x)));const pd=Math.min(...FIBS.map(x=>Math.abs(n-x*PHI)));s[n]=(FIBS.includes(n)?1:Math.max(0,1-fd/8))*.35+Math.max(0,1-pd/5)*.25+(f[n]/mf)*.4;}return s;}
function gapScores(){const f={},ls={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra},i)=>[...numbers,extra].forEach(n=>{f[n]++;if(ls[n]===undefined)ls[n]=i;}));const td=hist.length;const s={};for(let n=1;n<=49;n++){const ap=f[n]>0?td/f[n]:td;s[n]=Math.min((ls[n]!==undefined?ls[n]:td)/ap/3,1);}return s;}
function runMath(){
  const golden=goldenScores(),fib=fibScores(),gap=gapScores(),hot=hotScores(),cold=coldScores();
  const parity={},sum={},tail={};
  const p={odd:0,even:0};hist.forEach(({numbers})=>numbers.forEach(n=>n%2===0?p.even++:p.odd++));
  const r=p.odd/(p.odd+p.even);
  const sm=hist.map(({numbers})=>numbers.reduce((a,b)=>a+b,0));
  const apn=sm.reduce((a,b)=>a+b,0)/sm.length/6;
  const tf={};for(let t=0;t<=9;t++)tf[t]=0;
  hist.slice(0,10).forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>tf[n%10]++));
  const mt=Math.max(...Object.values(tf));
  for(let n=1;n<=49;n++){parity[n]=n%2?1-r:r;sum[n]=Math.max(0,1-Math.abs(n-apn)/25);tail[n]=1-tf[n%10]/(mt+1);}
  const W={golden:.20,fib:.15,gap:.25,parity:.15,sum:.15,tail:.10};
  const fs={};
  for(let n=1;n<=49;n++)fs[n]=(golden[n]||0)*W.golden+(fib[n]||0)*W.fib+(gap[n]||0)*W.gap+(parity[n]||0)*W.parity+(sum[n]||0)*W.sum+(tail[n]||0)*W.tail;
  return Object.entries(fs).sort((a,b)=>b[1]-a[1]).map(([n,score])=>({n:+n,score,golden:golden[n],fib:fib[n],gap:gap[n],parity:parity[n],sum:sum[n],tail:tail[n]}));
}

function runWorkshop(bday, mbti, sources){
  const scoreMap={}, labelMap={};
  for(let n=1;n<=49;n++){scoreMap[n]=0;labelMap[n]=[];}
  if(sources.birthday && bday){
    const[yr,mo,dy]=bday.split('-').map(Number);
    const zodiac=getZodiac(yr),star=getStar(mo,dy);
    const zl=ZODIAC_LUCKY[zodiac]||[],sl=STAR_LUCKY[star]||[];
    const bdNums=new Set([...zl,...sl,dy%49||49,mo%49||1,(yr%49)||7]);
    const seed=yr+mo*100+dy;
    for(let n=1;n<=49;n++){
      const sc=(bdNums.has(n)?1.5:0)+Math.abs(Math.sin(n*seed))*.3;
      scoreMap[n]+=sc;
      if(zl.includes(n))labelMap[n].push(zodiac+'生肖');
      if(sl.includes(n))labelMap[n].push(star+'星座');
    }
  }
  if(sources.mbti && mbti){const ml=MBTI_LUCKY[mbti]||[];ml.forEach((n,i)=>{scoreMap[n]+=1.2-i*.05;labelMap[n].push(mbti);});}
  if(sources.golden){const gs=goldenScores();for(let n=1;n<=49;n++){scoreMap[n]+=gs[n]*1.0;if(gs[n]>0.6)labelMap[n].push('黃金分割φ');}}
  if(sources.fib){const fs=fibScores();for(let n=1;n<=49;n++){scoreMap[n]+=fs[n]*0.8;if(fs[n]>0.5)labelMap[n].push('費氏數列∞');}}
  if(sources.gap){const gs=gapScores();for(let n=1;n<=49;n++){scoreMap[n]+=gs[n]*0.9;if(gs[n]>0.5)labelMap[n].push('遺漏回歸↩');}}
  if(sources.hot){const hs=hotScores();for(let n=1;n<=49;n++){scoreMap[n]+=hs[n]*0.8;if(hs[n]>0.6)labelMap[n].push('近期熱號🔥');}}
  if(sources.cold){const cs=coldScores();for(let n=1;n<=49;n++){scoreMap[n]+=cs[n]*0.8;if(cs[n]>0.6)labelMap[n].push('久違冷號🧊');}}
  const ranked=Object.entries(scoreMap).map(([n,s])=>({n:+n,score:s,labels:labelMap[+n]})).sort((a,b)=>b.score-a.score);
  const nums=ranked.slice(0,6).map(x=>x.n).sort((a,b)=>a-b);
  const extraCand=ranked.find(x=>!nums.includes(x.n));
  const extra=extraCand?extraCand.n:ranked[6].n;
  return{nums,extra,ranked,details:[...nums.map(n=>({n,labels:ranked.find(x=>x.n===n)?.labels||[],isExtra:false})),{n:extra,labels:extraCand?.labels||[],isExtra:true}]};
}

  }
  if(btn){btn.disabled=false;btn.textContent='🔄 更新最新官方數據';}
}

function parseHK(text){
  const rows=[];
  const pat=/\|\s*(\d{2}\/\d{3})\s*\|\s*(\d{2})\/(\d{2})\/(\d{4})\s*\|\s*((?:\*\s*\d+\s*)+)\|/g;
  let m;while((m=pat.exec(text))!==null){
    const draw=m[1],date=`${m[4]}-${m[3]}-${m[2]}`,nums=m[5].match(/\d+/g);
    if(nums&&nums.length>=7)rows.push({draw,date,numbers:nums.slice(0,6).map(Number).sort((a,b)=>a-b),extra:Number(nums[6])});
  }
  return rows;
}

function renderRefreshLog(){
  const el=document.getElementById('refresh-log');
  if(!el)return;
  el.innerHTML=refreshLog.map(l=>`<div style="font-size:11px;color:${l.startsWith('✅')?'#2e7d32':l.startsWith('❌')?'#c62828':l.startsWith('⚠️')?'#f57f17':'var(--sub)'};margin-bottom:3px;line-height:1.5">${l}</div>`).join('');
}

    const color=sel?'#fff':(off?'var(--dim)':col);

    html+=`<button onclick="${onToggleFn}(${n})" style="aspect-ratio:1;border-radius:50%;font-weight:800;font-size:11px;cursor:${off?'default':'pointer'};border:2px solid ${border};background:${bg};color:${color};padding:0">${n}</button>`;
  }
  return html+'</div>';
}

  wAiLoading=true;render();

  let extra='';
  if(wTab==='birthday'&&wBday){const[yr,mo,dy]=wBday.split('-').map(Number);extra=`生日:${wBday},生肖:${getZodiac(yr)},星座:${getStar(mo,dy)}座`;}
  if(wTab==='mbti'&&wMbti)extra=`MBTI:${wMbti}(${MBTI_DESC[wMbti]})`;
  if(wTab==='combo'){if(wBday)extra+=`生日:${wBday} `;if(wMbti)extra+=`MBTI:${wMbti}`;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:300,system:'你係輕鬆幽默嘅六合彩娛樂顧問。只回JSON：{"numbers":[6個1-49不重複號碼],"extra":特別號,"reason":"繁體60字，要有趣"}',messages:[{role:'user',content:`用戶：${extra}
近期：${recent}
Top10：${mathTop}`}]})});
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const r=JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
    if(r.numbers?.length===6){

  wAiLoading=false;render();
}

  const mx=Math.max(...Object.values(cnt))||1;
  const ZL={r:'🔴 紅1–10',b:'🔵 藍11–20',g:'🟢 綠21–30',o:'🟠 橙31–40',p:'🟣 紫41–49'};

        return `<div class="heat-cell" style="background:${zc}${alpha};border-color:${zc}33;box-shadow:${intensity>.7?`0 2px 10px ${zc}66`:'none'}">

}

  const l=hist[0];

function renderAIPredict(){
  function comb(n,k){if(k>n)return 0;let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return Math.round(r);}
  const dc=pCount-sureCt;
  const tickets=betMode==='combination'?comb(pCount,6):betMode==='bravery'?(()=>{const need=6-sureCt;if(dc<need||need<1)return 0;return comb(dc,need);})():1;
  return `
  <div class="card" style="border-top:4px solid #6a1b9a">
    <div style="font-size:14px;font-weight:900;color:#6a1b9a;margin-bottom:14px">🤖 AI 號碼建議</div>
    <div class="chips" style="margin-bottom:14px">
      ${[['standard','🎯 普通一注'],['combination','🎲 多寶'],['bravery','🦁 膽拖']].map(([m,l])=>`<button class="pill ${betMode===m?'active':''}" onclick="betMode='${m}';if(betMode!=='standard'&&pCount<7)pCount=7;render()" style="${betMode===m?'border-color:#6a1b9a;background:#f3e5f5;color:#6a1b9a':''}">${l}</button>`).join('')}
    </div>
    ${betMode!=='standard'?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${[7,8,9,10,11,12].map(n=>`<button onclick="pCount=${n};render()" style="width:42px;height:42px;border-radius:11px;border:2px solid ${pCount===n?'#6a1b9a':'var(--border)'};background:${pCount===n?'#f3e5f5':'var(--card)'};color:${pCount===n?'#6a1b9a':'var(--sub)'};font-weight:800;font-size:15px;cursor:pointer">${n}</button>`).join('')}</div>`:''}
    ${betMode==='bravery'?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${Array.from({length:Math.min(5,pCount-1)},(_,i)=>i+1).map(n=>`<button onclick="sureCt=${n};render()" style="width:42px;height:42px;border-radius:11px;border:2px solid ${sureCt===n?'#2e7d32':'var(--border)'};background:${sureCt===n?'#e8f5e9':'var(--card)'};color:${sureCt===n?'#2e7d32':'var(--sub)'};font-weight:800;font-size:15px;cursor:pointer">${n}</button>`).join('')}</div>`:''}
    <div style="background:var(--row);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:11px;color:var(--sub)">${betMode==='standard'?'普通一注':betMode==='combination'?`C(${pCount},6)=${comb(pCount,6)}注`:`膽${sureCt}拖${dc}`}</div>
      <div style="text-align:right"><div style="font-size:18px;font-weight:900;color:#e65100">HK$${(tickets*10).toLocaleString()}</div><div style="font-size:9px;color:var(--dim)">${tickets}注×$10</div></div>
    </div>
    <button class="btn btn-purple btn-full" onclick="doAI()" ${pLoading?'disabled':''}>${pLoading?'🔮 AI 分析中...':'🔮 生成號碼建議'}</button>
  </div>
  ${aiResult?aiResult.error?`<div class="card" style="text-align:center"><span style="color:#c62828;font-weight:700">❌ 生成失敗，請重試</span></div>`
  :aiResult.type==='bravery'?`<div class="result-card"><div style="margin-bottom:12px"><div style="font-size:11px;color:#2e7d32;font-weight:800;margin-bottom:6px">膽碼</div><div style="display:flex;gap:6px;flex-wrap:wrap">${aiResult.sure.map(n=>ball(n,46,false,false,true,'#2e7d32')).join('')}</div></div><div style="margin-bottom:12px"><div style="font-size:11px;color:#e65100;font-weight:800;margin-bottom:6px">拖碼</div><div style="display:flex;gap:6px;flex-wrap:wrap">${aiResult.drag.map(n=>ball(n,46,false,false,true,'#e65100')).join('')}</div></div><div style="background:var(--row);border-radius:10px;padding:12px;font-size:12px;line-height:1.8">${aiResult.analysis}</div></div>`
  :`<div class="result-card"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:10px">${ballsRow(aiResult.numbers,aiResult.extra,48)}</div><div style="background:var(--row);border-radius:10px;padding:12px;font-size:12px;line-height:1.8">${aiResult.analysis}</div></div>`:''}`;
}

function doMath(){
  mLoading=true;mResult=null;render();
  setTimeout(()=>{
    try{
      const ranked=runMath();
      const sortMap={golden:(a,b)=>b.golden-a.golden,fib:(a,b)=>b.fib-a.fib,gap:(a,b)=>b.gap-a.gap,parity:(a,b)=>b.parity-a.parity,sumzone:(a,b)=>b.sum-a.sum,tail:(a,b)=>b.tail-a.tail};
      const mr=sortMap[mMethod]?[...ranked].sort(sortMap[mMethod]):ranked;
      const top=mr.slice(0,6).map(x=>x.n).sort((a,b)=>a-b);
      const extra=[...ranked].sort((a,b)=>b.gap-a.gap).find(x=>!top.includes(x.n)).n;
      mResult={numbers:top,extra,top15:mr.slice(0,15)};
    }catch{mResult={error:true};}
    mLoading=false;render();
  },80);
}

async function doAI(){
  const apiKey=localStorage.getItem('ms_key')||'';
  if(!apiKey){showToast('⚙️ 請先設定 API Key','err');return;}
  pLoading=true;aiResult=null;render();
  const ranked=runMath();
  const mathTop=ranked.slice(0,10).map(r=>`${r.n}(${(r.score*100).toFixed(0)})`).join(',');
  const recent=hist.slice(0,5).map(h=>`${h.draw}:${h.numbers.join(',')}+特${h.extra}`).join('|');
  const dc=pCount-sureCt;
  let sp,um;
  if(betMode==='bravery'){sp=`六合彩分析師。只回JSON：{"sure":[${sureCt}個膽碼],"drag":[${dc}個拖碼],"extra":特別號,"analysis":"繁體60字"}`;um=`近期:${recent}
Top10:${mathTop}
膽${sureCt}拖${dc}`;}
  else{sp=`六合彩分析師。只回JSON：{"numbers":[${pCount}個1-49不重複],"extra":特別號,"analysis":"繁體60字"}`;um=`近期:${recent}
Top10:${mathTop}
建議${pCount}個`;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,system:sp,messages:[{role:'user',content:um}]})});
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const r=JSON.parse((d.content?.[0]?.text||'').replace(/```json|```/g,'').trim());
    if(betMode==='bravery'){if(r.sure?.length===sureCt&&r.drag)aiResult={type:'bravery',...r};else throw 0;}
    else{if(r.numbers?.length===pCount)aiResult={type:'standard',...r};else throw 0;}
  }catch{aiResult={error:true};}
  pLoading=false;render();
}

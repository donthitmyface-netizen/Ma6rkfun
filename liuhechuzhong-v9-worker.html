// ── 數學引擎 ──
const PHI=1.6180339887,FIBS=[1,2,3,5,8,13,21,34];
function goldenScores(hist){const gp=[49/PHI,49/PHI**2,49*(1-1/PHI),49/PHI**3,49*(2-PHI),49*(PHI-1),30,19];const f={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f));const s={};for(let n=1;n<=49;n++){const d=Math.min(...gp.map(p=>Math.abs(n-p)));s[n]=Math.max(0,1-d/10)*.6+(f[n]/mf)*.4;}return s;}
function fibScores(hist){const f={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f));const s={};for(let n=1;n<=49;n++){const fd=Math.min(...FIBS.map(x=>Math.abs(n-x)));const fss=FIBS.some((x,i)=>i>0&&n>FIBS[i-1]&&n<x)?.3:0;const pd=Math.min(...FIBS.map(x=>Math.abs(n-x*PHI)));s[n]=(FIBS.includes(n)?1:Math.max(0,1-fd/8))*.35+Math.max(0,1-pd/5)*.25+fss+(f[n]/mf)*.4;}return s;}
function gapScores(hist){const f={},ls={};for(let i=1;i<=49;i++)f[i]=0;hist.forEach(({numbers,extra},i)=>[...numbers,extra].forEach(n=>{f[n]++;if(ls[n]===undefined)ls[n]=i;}));const td=hist.length;const s={};for(let n=1;n<=49;n++){const ap=f[n]>0?td/f[n]:td;s[n]=Math.min((ls[n]!==undefined?ls[n]:td)/ap/3,1);}return s;}
function parityScores(hist){const p={odd:0,even:0};hist.forEach(({numbers})=>numbers.forEach(n=>n%2===0?p.even++:p.odd++));const r=p.odd/(p.odd+p.even);const s={};for(let n=1;n<=49;n++)s[n]=n%2?1-r:r;return s;}
function sumScores(hist){const sm=hist.map(({numbers})=>numbers.reduce((a,b)=>a+b,0));const apn=sm.reduce((a,b)=>a+b,0)/sm.length/6;const s={};for(let n=1;n<=49;n++)s[n]=Math.max(0,1-Math.abs(n-apn)/25);return s;}
function tailScores(hist){const tf={};for(let t=0;t<=9;t++)tf[t]=0;hist.slice(0,10).forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>tf[n%10]++));const mt=Math.max(...Object.values(tf));const s={};for(let n=1;n<=49;n++)s[n]=1-tf[n%10]/(mt+1);return s;}
function hotScores(hist){const f={};for(let i=1;i<=49;i++)f[i]=0;hist.slice(0,12).forEach(({numbers,extra})=>[...numbers,extra].forEach(n=>f[n]++));const mf=Math.max(...Object.values(f))||1;const s={};for(let n=1;n<=49;n++)s[n]=f[n]/mf;return s;}
function coldScores(hist){const hs=hotScores(hist);const s={};for(let n=1;n<=49;n++)s[n]=1-hs[n];return s;}
function runMath(hist){
  const golden=goldenScores(hist),fib=fibScores(hist),gap=gapScores(hist),parity=parityScores(hist),sum=sumScores(hist),tail=tailScores(hist);
  const W={golden:.20,fib:.15,gap:.25,parity:.15,sum:.15,tail:.10};const fs={};
  for(let n=1;n<=49;n++)fs[n]=(golden[n]||0)*W.golden+(fib[n]||0)*W.fib+(gap[n]||0)*W.gap+(parity[n]||0)*W.parity+(sum[n]||0)*W.sum+(tail[n]||0)*W.tail;
  return Object.entries(fs).sort((a,b)=>b[1]-a[1]).map(([n,score])=>({n:+n,score,golden:golden[n],fib:fib[n],gap:gap[n],parity:parity[n],sum:sum[n],tail:tail[n]}));
}

// 核心配方生成引擎
// sources: {birthday, mbti, golden, hot, cold, math}
// 回傳每個號碼的「得分」和「來源標籤」
function runWorkshop(params, hist){
  const {bday, mbti, sources} = params;
  const freq = calcStats(hist).freq;
  // 計算各方法分數
  const scoreMap = {};
  const labelMap = {}; // n -> [source labels]
  for(let n=1;n<=49;n++){scoreMap[n]=0;labelMap[n]=[];}

  if(sources.birthday && bday){
    const [yr,mo,dy]=bday.split("-").map(Number);
    const zodiac=getZodiac(yr), star=getStar(mo,dy);
    const zl=ZODIAC_LUCKY[zodiac]||[], sl=STAR_LUCKY[star]||[];
    const bdNums=new Set([...zl,...sl,dy%49||49,mo%49||1,(yr%49)||7]);
    const seed=yr+mo*100+dy;
    for(let n=1;n<=49;n++){
      const sc=(bdNums.has(n)?1.5:0)+Math.abs(Math.sin(n*seed))*.3;
      scoreMap[n]+=sc;
      if(zl.includes(n))labelMap[n].push(`${zodiac}座`);
      if(sl.includes(n))labelMap[n].push(`${star}星座`);
    }
  }
  if(sources.mbti && mbti){
    const ml=MBTI_LUCKY[mbti]||[];
    ml.forEach((n,i)=>{scoreMap[n]+=1.2-i*.05;labelMap[n].push(mbti);});
  }
  if(sources.golden){
    const gs=goldenScores(hist);
    for(let n=1;n<=49;n++){scoreMap[n]+=gs[n]*1.0;if(gs[n]>0.6)labelMap[n].push("黃金分割φ");}
  }
  if(sources.fib){
    const fs=fibScores(hist);
    for(let n=1;n<=49;n++){scoreMap[n]+=fs[n]*0.8;if(fs[n]>0.5)labelMap[n].push("費氏數列∞");}
  }
  if(sources.gap){
    const gs=gapScores(hist);
    for(let n=1;n<=49;n++){scoreMap[n]+=gs[n]*0.9;if(gs[n]>0.5)labelMap[n].push("遺漏回歸↩");}
  }
  if(sources.hot){
    const hs=hotScores(hist);
    for(let n=1;n<=49;n++){scoreMap[n]+=hs[n]*0.8;if(hs[n]>0.6)labelMap[n].push("近期熱號🔥");}
  }
  if(sources.cold){
    const cs=coldScores(hist);
    for(let n=1;n<=49;n++){scoreMap[n]+=cs[n]*0.8;if(cs[n]>0.6)labelMap[n].push("久違冷號🧊");}
  }

  const ranked=Object.entries(scoreMap).map(([n,s])=>({n:+n,score:s,labels:labelMap[+n]}))
    .sort((a,b)=>b.score-a.score);
  const nums=ranked.slice(0,6).map(x=>x.n).sort((a,b)=>a-b);
  const extraCand=ranked.find(x=>!nums.includes(x.n));
  const extra=extraCand?extraCand.n:ranked[6].n;
  const details=nums.map(n=>{
    const r=ranked.find(x=>x.n===n);
    return {n,labels:r?r.labels:[],score:r?r.score:0};
  });
  details.push({n:extra,labels:extraCand?extraCand.labels:[],score:extraCand?extraCand.score:0,isExtra:true});
  return {nums,extra,details,ranked};
}

function Ball({n,sz=40,extra=false,dim=false,ring=false,ringColor,dark=false}){
  const cl=dark?ZCDark[gz(n)]:ZCLight[gz(n)];const c=ZC[gz(n)];const rc=ringColor||(extra?"#fff":c);
  return <div style={{width:sz,height:sz,borderRadius:"50%",flexShrink:0,background:extra?c:cl,border:ring?`3px solid ${rc}`:extra?`2.5px solid ${c}`:`2px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",color:extra?"#fff":(dark?"#ddd":c),fontWeight:900,fontSize:Math.round(sz*.37),boxShadow:ring?`0 0 0 2px ${rc},0 3px 10px rgba(0,0,0,.2)`:extra?`0 3px 10px rgba(0,0,0,.3)`:`0 2px 6px rgba(0,0,0,.12)`,opacity:dim?.35:1,userSelect:"none",transition:"all .15s"}}>{n}</div>;
}

function Confetti({show}){
  if(!show)return null;
  return <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:9990,overflow:"hidden"}}>
    {Array.from({length:40}).map((_,i)=>(
      <div key={i} style={{position:"absolute",left:`${(i*37+13)%100}%`,top:"-20px",width:i%3===0?10:7,height:i%3===0?10:7,borderRadius:i%2?"50%":"2px",background:CONFETTI_COLORS[i%6],animation:`confettiFall ${1.2+i*.06}s ease-in ${(i*.04)%0.8}s forwards`}}/>
    ))}
  </div>;
}

  async function doRefresh(){
    if(WORKER_URL==="YOUR_CLOUDFLARE_WORKER_URL"){
      toast2("⚙️ 請先設定 Cloudflare Worker URL！查看代碼頂部的 WORKER_URL 說明。","err",6000);
      setRefLog(["❌ 尚未設定 Worker URL","請參考步驟說明建立 Cloudflare Worker","設好後把 URL 填入代碼頂部 WORKER_URL"]);
      return;
    }
    setRef(true);
    setRefLog(["🔄 連接你的 Cloudflare Worker..."]);
    function parseHK(text){
      const rows=[];
      const pat=/\|\s*(\d{2}\/\d{3})\s*\|\s*(\d{2})\/(\d{2})\/(\d{4})\s*\|\s*((?:\*\s*\d+\s*)+)\|/g;
      let m;while((m=pat.exec(text))!==null){
        const draw=m[1],date=`${m[4]}-${m[3]}-${m[2]}`,nums=m[5].match(/\d+/g);
        if(nums&&nums.length>=7)rows.push({draw,date,numbers:nums.slice(0,6).map(Number).sort((a,b)=>a-b),extra:Number(nums[6])});
      }
      return rows;
    }
    try{
      setRefLog(l=>[...l,"📡 發送請求至 Worker..."]);
      const res=await fetch(WORKER_URL,{signal:AbortSignal.timeout(15000)});
      if(!res.ok){
        setRefLog(l=>[...l,`❌ Worker 回應錯誤：HTTP ${res.status}`,"請檢查 Worker 是否正確部署"]);
        toast2(`❌ Worker 錯誤 HTTP ${res.status}`,"err");
        setRef(false);return;
      }
      setRefLog(l=>[...l,"✅ Worker 回應成功，解析數據..."]);
      const text=await res.text();
      const rows=parseHK(text);
      if(rows.length>0){
        const merged=[...rows,...hist].reduce((acc,h)=>{if(!acc.find(x=>x.draw===h.draw))acc.push(h);return acc;},[]).sort((a,b)=>b.draw.localeCompare(a.draw));
        setHist(merged);setNextDraw(calcNextDraw(merged));
        autoScoreBoard(merged,boardEntries);
        setRefLog(l=>[...l,`✅ 成功解析 ${rows.length} 期數據`,`📊 最新：${merged[0].draw}（${merged[0].date}）`,`🎱 正碼：${merged[0].numbers.join(",")} 特：${merged[0].extra}`]);
        toast2(`✅ 更新成功！最新 ${merged[0].draw}：${merged[0].numbers.join(",")} 特${merged[0].extra} 🎉`,"ok",6000);
        showConfetti();
      }else{
        setRefLog(l=>[...l,"⚠️ 數據格式無法解析","lottery.hk 可能更改了頁面結構","請聯絡管理員更新解析邏輯"]);
        toast2("⚠️ 數據抓到但格式有變，請稍後再試","err");
      }
    }catch(e){
      const msg=e.name==="TimeoutError"?"請求超時（15秒）":e.message;
      setRefLog(l=>[...l,`❌ 錯誤：${msg}`,"請確認 Worker URL 正確","Worker 需要部署並運行中"]);
      toast2(`❌ 連接失敗：${msg}`,"err");
    }
    setRef(false);
  }

        <div style={{display:"flex",marginBottom:14,background:T.barTrack,borderRadius:12,padding:4}}>
          {[["math","📐 數學引擎","#e65100"],["ai","🤖 AI 預測","#6a1b9a"]].map(([id,label,c])=>(
            <button key={id} onClick={()=>setPTab(id)} style={{flex:1,padding:"10px 0",border:"none",borderRadius:9,background:pTab===id?T.card:"none",color:pTab===id?c:T.textSub,fontWeight:800,fontSize:13,cursor:"pointer",boxShadow:pTab===id?`0 2px 8px ${T.shadow}`:"none",transition:"all .2s"}}>{label}</button>
          ))}
        </div>
        {pTab==="math"&&<>
          <Card accent="#e65100">
            <div style={{fontSize:14,fontWeight:900,color:"#e65100",marginBottom:4}}>📐 數學預測引擎</div>
            <div style={{fontSize:11,color:T.textSub,marginBottom:14}}>純本地計算，無需網絡，{hist.length} 期官方數據</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {[{key:"combined",label:"綜合評分",icon:"⚡",color:"#e65100"},{key:"golden",label:"黃金分割",icon:"φ",color:"#f57f17"},{key:"fib",label:"費氏數列",icon:"∞",color:"#bf360c"},{key:"gap",label:"遺漏回歸",icon:"↩",color:"#2e7d32"},{key:"parity",label:"奇偶平衡",icon:"⚖",color:"#1565c0"},{key:"sumzone",label:"和值區間",icon:"Σ",color:"#6a1b9a"},{key:"tail",label:"尾數分析",icon:"09",color:"#c62828"}].map(info=>(
                <button key={info.key} onClick={()=>setMMethod(info.key)} style={{padding:"11px 12px",borderRadius:11,border:`2px solid ${mMethod===info.key?info.color:T.cardBorder}`,background:mMethod===info.key?T.accentSub:T.row,cursor:"pointer",textAlign:"left",boxShadow:mMethod===info.key?`0 2px 8px ${info.color}33`:"none",transition:"all .15s"}}>
                  <div style={{fontSize:15,marginBottom:3}}>{info.icon}</div>
                  <div style={{fontSize:12,fontWeight:800,color:mMethod===info.key?info.color:T.text}}>{info.label}</div>
                </button>
              ))}
            </div>
            <Btn onClick={doMath} disabled={mLoad} variant="gold" full>{mLoad?"🔄 計算中...":"📐 開始分析"}</Btn>
          </Card>
          {mRes&&(mRes.error?<Card sty={{textAlign:"center"}}><span style={{color:"#c62828",fontWeight:700}}>❌ 計算失敗</span></Card>:<>
            <Card accent="#e65100" sty={{textAlign:"center"}}>
              <div style={{fontSize:11,color:T.textDim,marginBottom:10}}>⚠️ 純屬娛樂，中獎係靠緣份！</div>
              <div style={{...bRow,justifyContent:"center",marginBottom:6}}>{mRes.numbers.map(n=><BR key={n} n={n} sz={50}/>)}<span style={{color:T.textDim,fontSize:22,margin:"0 4px"}}>+</span><BR n={mRes.extra} sz={50} extra/></div>
            </Card>
            <Card>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontSize:13,fontWeight:800,color:T.text}}>📊 TOP 15 評分</div>
                <button onClick={()=>setShowDet(s=>!s)} style={{fontSize:11,color:T.textSub,background:T.row,border:`1.5px solid ${T.cardBorder}`,borderRadius:8,padding:"4px 10px",cursor:"pointer",fontWeight:600}}>{showDet?"收起":"詳細"}</button>
              </div>
              {mRes.top15.map((item,i)=>{const isSel=mRes.numbers.includes(item.n),c=ZC[gz(item.n)];return <div key={item.n} style={{display:"flex",alignItems:"center",gap:9,marginBottom:8}}><span style={{color:isSel?T.accent:T.textDim,fontSize:11,width:18,textAlign:"right",fontWeight:700}}>{i+1}</span><BR n={item.n} sz={32} ring={isSel} ringColor={T.accent}/><div style={{flex:1}}><div style={{height:6,background:T.barTrack,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${item.score*100}%`,background:isSel?T.accent:c,borderRadius:3}}/></div>{showDet&&<div style={{marginTop:6}}><SBar score={item.golden} color="#f57f17" label="黃金"/><SBar score={item.fib} color="#bf360c" label="費氏"/><SBar score={item.gap} color="#2e7d32" label="遺漏"/><SBar score={item.parity} color="#1565c0" label="奇偶"/><SBar score={item.sum} color="#6a1b9a" label="和值"/><SBar score={item.tail} color="#c62828" label="尾數"/></div>}</div><div style={{background:isSel?T.accentSub:T.row,padding:"3px 8px",borderRadius:8}}><span style={{fontSize:12,fontWeight:800,color:isSel?T.accent:T.textSub}}>{(item.score*100).toFixed(0)}</span></div></div>;})}
            </Card>
          </>)}
        </>}
        {pTab==="ai"&&<>
          <Card accent="#6a1b9a">
            <div style={{fontSize:14,fontWeight:900,color:"#6a1b9a",marginBottom:14}}>🤖 AI 號碼建議</div>
            <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}><Pill active={betMode==="standard"} onClick={()=>{setBetMode("standard");setPCount(6);}} color="#6a1b9a">🎯 普通一注</Pill><Pill active={betMode==="combination"} onClick={()=>{setBetMode("combination");if(pCount<7)setPCount(7);}} color="#e65100">🎲 多寶</Pill><Pill active={betMode==="bravery"} onClick={()=>{setBetMode("bravery");if(pCount<7)setPCount(7);}} color="#2e7d32">🦁 膽拖</Pill></div>
            {betMode!=="standard"&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>{[7,8,9,10,11,12].map(n=>(<button key={n} onClick={()=>{setPCount(n);if(betMode==="bravery"&&sureCt>=n)setSureCt(n-1);}} style={{width:42,height:42,borderRadius:11,border:`2px solid ${pCount===n?"#6a1b9a":T.cardBorder}`,background:pCount===n?"#f3e5f5":T.card,color:pCount===n?"#6a1b9a":T.textSub,fontWeight:800,fontSize:15,cursor:"pointer"}}>{n}</button>))}</div>}
            {betMode==="bravery"&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{Array.from({length:Math.min(5,pCount-1)},(_,i)=>i+1).map(n=>(<button key={n} onClick={()=>setSureCt(n)} style={{width:42,height:42,borderRadius:11,border:`2px solid ${sureCt===n?"#2e7d32":T.cardBorder}`,background:sureCt===n?"#e8f5e9":T.card,color:sureCt===n?"#2e7d32":T.textSub,fontWeight:800,fontSize:15,cursor:"pointer"}}>{n}</button>))}</div>}
            <div style={{background:T.row,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:11,color:T.textSub}}>{betMode==="standard"?"普通一注":betMode==="combination"?`C(${pCount},6)=${comb(pCount,6)}注`:`膽${sureCt}拖${dc}`}</div><div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:900,color:"#e65100"}}>HK${(tickets*10).toLocaleString()}</div><div style={{fontSize:9,color:T.textDim}}>{tickets}注×$10</div></div></div>
            <Btn onClick={doAI} disabled={pLoad||(betMode==="bravery"&&dc<6-sureCt)} variant="purple" full>{pLoad?"🔮 AI 分析中...":"🔮 生成號碼建議"}</Btn>
          </Card>
          {pRes&&(pRes.error?<Card sty={{textAlign:"center"}}><span style={{color:"#c62828",fontWeight:700}}>❌ 生成失敗，請重試</span></Card>
          :pRes.type==="bravery"?<Card accent="#2e7d32"><div style={{marginBottom:12}}><div style={{fontSize:11,color:"#2e7d32",fontWeight:800,marginBottom:6}}>膽碼</div><div style={bRow}>{pRes.sure.map(n=><BR key={n} n={n} sz={46} ring ringColor="#2e7d32"/>)}</div></div><div style={{marginBottom:12}}><div style={{fontSize:11,color:"#e65100",fontWeight:800,marginBottom:6}}>拖碼</div><div style={bRow}>{pRes.drag.map(n=><BR key={n} n={n} sz={46} ring ringColor="#e65100"/>)}</div></div><div style={{background:T.row,borderRadius:10,padding:12,fontSize:12,color:T.text,lineHeight:1.8}}>{pRes.analysis}</div></Card>
          :<Card accent="#6a1b9a"><div style={{...bRow,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>{pRes.numbers.map(n=><BR key={n} n={n} sz={pRes.numbers.length<=6?48:42}/>)}<span style={{color:T.textDim,fontSize:20,margin:"0 4px"}}>+</span><BR n={pRes.extra} sz={pRes.numbers.length<=6?48:42} extra/></div><div style={{background:T.row,borderRadius:10,padding:12,fontSize:12,color:T.text,lineHeight:1.8}}>{pRes.analysis}</div></Card>)}
        </>}
      </>}

      {/* ═══ 社區討論 ═══ */}
      {tab==="discuss"&&<>
        {!selPost?<>
          {/* 置頂公告 */}
          <div style={{fontSize:12,color:T.textSub,fontWeight:700,marginBottom:8}}>📌 置頂公告</div>
          {DISCUSSION_POSTS.filter(p=>p.pin).map(post=>(
            <div key={post.id} onClick={()=>setSelPost(post)} style={{...rowSty,cursor:"pointer",background:`linear-gradient(135deg,${T.card},${T.accentSub})`,border:`1.5px solid ${T.accent}33`,flexDirection:"column",alignItems:"flex-start",gap:6,padding:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8,width:"100%"}}>
                <span style={{fontSize:20}}>{post.emoji}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:800,color:T.text}}>{post.title}</div><div style={{fontSize:9,color:T.textSub}}>管理員 · {post.date}</div></div>
                {post.likes>0&&<div style={{fontSize:10,color:T.textDim}}>❤️ {post.likes}</div>}
              </div>
              <div style={{fontSize:11,color:T.textSub,lineHeight:1.6,borderTop:`1px solid ${T.cardBorder}`,paddingTop:8,width:"100%"}}>{post.content.slice(0,70)}...</div>
            </div>
          ))}

          {/* 一般討論 */}
          <div style={{fontSize:12,color:T.textSub,fontWeight:700,margin:"14px 0 8px"}}>💬 管理員討論</div>
          {DISCUSSION_POSTS.filter(p=>!p.pin).map(post=>(
            <div key={post.id} onClick={()=>setSelPost(post)} style={{...rowSty,cursor:"pointer",flexDirection:"column",alignItems:"flex-start",gap:6,padding:14}}>
              <div style={{display:"flex",alignItems:"center",gap:8,width:"100%"}}>
                <span style={{fontSize:18}}>{post.emoji}</span>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:T.text}}>{post.title}</div><div style={{fontSize:9,color:T.textSub}}>管理員 · {post.date}</div></div>
                <div style={{fontSize:10,color:T.textDim}}>❤️ {post.likes}</div>
              </div>
              <div style={{fontSize:11,color:T.textSub,lineHeight:1.6}}>{post.content.slice(0,80)}...</div>
            </div>
          ))}

          {/* Disqus */}
          <Card sty={{marginTop:4}}>
            <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:4}}>💬 加入討論</div>
            <div style={{fontSize:11,color:T.textSub,marginBottom:12,lineHeight:1.7}}>點任何帖子可查看全文，或在下方直接留言！<br/>留言需要 Disqus 帳號（免費）。</div>
            <div id="disqus_thread" style={{minHeight:200}}/>
          </Card>
          <Card><div style={{fontSize:11,color:T.textDim,lineHeight:1.9}}>📋 <strong>社群守則</strong><br/>· 歡迎分享號碼分析及預測心得<br/>· 禁止散佈「保證中獎」等謠言<br/>· 勿分享個人財務資訊<br/>· 理性娛樂，量力而為，開心最重要 😄</div></Card>
        </>:<>
          <button onClick={()=>setSelPost(null)} style={{display:"flex",alignItems:"center",gap:6,marginBottom:12,background:"none",border:`1.5px solid ${T.cardBorder}`,borderRadius:10,padding:"8px 14px",color:T.textSub,cursor:"pointer",fontSize:13,fontWeight:600}}>← 返回</button>
          <Card accent={T.accent}>
            <div style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:12}}>
              <span style={{fontSize:28}}>{selPost.emoji}</span>
              <div><div style={{fontSize:15,fontWeight:900,color:T.text,marginBottom:4}}>{selPost.title}</div><div style={{fontSize:10,color:T.textSub}}>管理員 · {selPost.date}{selPost.likes>0?` · ❤️${selPost.likes}`:""}</div></div>
            </div>
            <div style={{fontSize:13,color:T.text,lineHeight:1.9,background:T.row,borderRadius:10,padding:14,whiteSpace:"pre-line"}}>{selPost.content}</div>
          </Card>
          <Card sty={{textAlign:"center",color:T.textSub}}>
            <div style={{fontSize:11,lineHeight:1.7}}>💬 對這篇文章有想法？<br/>回到社區頁面，在 Disqus 討論區留言！</div>
          </Card>
        </>}
      </>}

      </div>
    </div>
  );
}

function SettingsModal({onClose}){
  const[key,setKey]=useState(localStorage.getItem("ms_key")||"");
  const[saved,setSaved]=useState(false);
  function save(){localStorage.setItem("ms_key",key.trim());setSaved(true);setTimeout(()=>{setSaved(false);onClose();},1200);}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:20,padding:24,maxWidth:360,width:"100%",boxShadow:"0 8px 40px rgba(0,0,0,.3)"}}>
        <div style={{fontSize:16,fontWeight:900,color:"#e91e63",marginBottom:4}}>⚙️ API Key 設定</div>
        <div style={{fontSize:11,color:"#757575",marginBottom:16,lineHeight:1.9}}>填入 Anthropic API Key 啟用 AI 功能。<br/>申請：<span style={{color:"#e91e63"}}>console.anthropic.com</span>（免費）<br/>每次約 HK$0.01 · 其他功能完全免費</div>
        <input value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api03-..." type="password" style={{width:"100%",padding:"11px 13px",background:"#f5f5f5",border:"1.5px solid #e0e0e0",borderRadius:10,color:"#212121",fontSize:13,outline:"none",marginBottom:16,boxSizing:"border-box"}}/>
        <div style={{display:"flex",gap:8}}>
          <button onClick={save} style={{flex:1,padding:12,borderRadius:10,border:"none",background:saved?"#2e7d32":"#e91e63",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>{saved?"✅ 已儲存！":"儲存"}</button>
          <button onClick={onClose} style={{padding:"12px 16px",borderRadius:10,border:"1.5px solid #e0e0e0",background:"#fff",color:"#424242",fontWeight:700,fontSize:14,cursor:"pointer"}}>取消</button>
        </div>
      </div>
    </div>
  );
}
function Root(){
  const[show,setShow]=useState(false);
  return <>{show&&<SettingsModal onClose={()=>setShow(false)}/>}<App/><button onClick={()=>setShow(true)} title="設定 API Key" style={{position:"fixed",bottom:22,right:16,width:48,height:48,borderRadius:"50%",border:"none",background:"linear-gradient(135deg,#e91e63,#ff6090)",fontSize:20,cursor:"pointer",boxShadow:"0 4px 16px rgba(233,30,99,.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff"}}>⚙️</button></>;
}
ReactDOM.render(React.createElement(Root),document.getElementById("root"));
</script>
</body>
</html>
